# ==========================================
# 开发环境：后端容器 + MySQL + Redis（+ ensure-env 兜底）
#
# 配置源分工（Docker 开发全套模式）：
#   - 项目根目录 .env：唯一主配置源；用户只需要维护这一份
#   - backend/.env：   ThinkPHP/Swoole 运行时派生文件，由 ensure-env 自动生成
#
# 两种启动方式（详见 docs/env-files.md）：
#   1. 零配置：docker compose -f docker-compose.dev.yml up -d
#              （ensure-env 会自动生成根 .env，并派生 backend/.env）
#   2. 自定义：cp deploy/docker/.example.env .env && 按需改 && up -d
#              （ensure-env 会按根 .env 重新派生 backend/.env）
#
# 仅后端：docker compose -f docker-compose.dev.yml up -d --no-deps backend
#         （需自备 MySQL + Redis；建议 DB_HOST=host.docker.internal）
#         若不加 --no-deps，会把 ensure-env / mysql / redis 一并拉起
# ==========================================

name: ${MALLBASE_COMPOSE_PROJECT_NAME:-mallbase}

services:
  # 一次性 preflight 容器：确保数据目录和升级共享目录存在且容器可写。
  prepare-data-dirs:
    image: alpine:3.19
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-prepare-data-dirs
    environment:
      MALLBASE_DEV_UID: "${MALLBASE_DEV_UID:-10000}"
      MALLBASE_DEV_GID: "${MALLBASE_DEV_GID:-10000}"
    volumes:
      - .:/workdir
      - ./deploy/docker/prepare-data-dirs.sh:/prepare-data-dirs.sh:ro
    command: sh /prepare-data-dirs.sh
    restart: "no"

  # 一次性 init 容器：确保根 .env 存在，并据此派生 backend/.env
  ensure-env:
    image: alpine:3.19
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-ensure-env
    volumes:
      - .:/workdir
      - ./deploy/docker/ensure-env.sh:/ensure-env.sh:ro
    command: sh /ensure-env.sh
    restart: "no"
    depends_on:
      prepare-data-dirs:
        condition: service_completed_successfully

  # 一次性 preflight 容器：在方式三启动阶段校验业务库账号能否用当前根 .env 登录。
  # 目的：尽早发现“data/mysql 是旧数据，但根 .env 的 DB_PASS 后改过”的场景，
  # 避免用户打开安装向导后才发现明显的连接错误。
  check-db-auth:
    image: mysql:8.0
    pull_policy: always
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-check-db-auth
    volumes:
      - .:/workdir:ro
      - ./deploy/docker/check-db-auth.sh:/check-db-auth.sh:ro
    command: sh /check-db-auth.sh
    restart: "no"
    depends_on:
      ensure-env:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy

  # 可选 CLI 安装容器：不参与方式三默认启动链路。
  # 仅用于无人值守或手动执行 `php think install:auto`。
  install-auto:
    profiles: ["tools"]
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.dev
    image: mallbase-backend:dev
    pull_policy: never
    user: "${MALLBASE_DEV_UID:-10000}:${MALLBASE_DEV_GID:-10000}"
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-install-auto
    env_file:
      - path: .env
        required: false
    environment:
      TZ: Asia/Shanghai
      MALLBASE_RUNTIME_MODE: development
      MALLBASE_UPGRADE_ROOT: /app/upgrade
    volumes:
      - ./backend:/app
      - ./.version:/.version:ro
      - type: bind
        source: ./upgrade/bin
        target: /app/upgrade/bin
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./upgrade/config
        target: /app/upgrade/config
        bind:
          create_host_path: true
      - type: bind
        source: ./upgrade/run
        target: /app/upgrade/run
        bind:
          create_host_path: true
      - type: bind
        source: ./upgrade/jobs
        target: /app/upgrade/jobs
        bind:
          create_host_path: true
      - type: bind
        source: ./upgrade/backups
        target: /app/upgrade/backups
        bind:
          create_host_path: true
    command: php think install:auto
    restart: "no"
    depends_on:
      ensure-env:
        condition: service_completed_successfully
      check-db-auth:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.dev
    image: mallbase-backend:dev
    pull_policy: never
    user: "${MALLBASE_DEV_UID:-10000}:${MALLBASE_DEV_GID:-10000}"
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    ports:
      - "${SWOOLE_HTTP_PORT:-8080}:${SWOOLE_HTTP_PORT:-8080}"
    environment:
      TZ: Asia/Shanghai
      MALLBASE_RUNTIME_MODE: development
      MALLBASE_UPGRADE_ROOT: /app/upgrade
    volumes:
      - ./backend:/app
      - ./.version:/.version:ro
      - type: bind
        source: ./upgrade/bin
        target: /app/upgrade/bin
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./upgrade/config
        target: /app/upgrade/config
        bind:
          create_host_path: true
      - type: bind
        source: ./upgrade/run
        target: /app/upgrade/run
        bind:
          create_host_path: true
      - type: bind
        source: ./upgrade/jobs
        target: /app/upgrade/jobs
        bind:
          create_host_path: true
      - type: bind
        source: ./upgrade/backups
        target: /app/upgrade/backups
        bind:
          create_host_path: true
    depends_on:
      ensure-env:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    pull_policy: always
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - .:/workdir:ro
      - ./data/mysql:/var/lib/mysql
      - ./backend/install/data/schema:/docker-entrypoint-initdb.d/sql:ro
      - ./deploy/docker/mysql/init.sh:/docker-entrypoint-initdb.d/00-init.sh:ro
      - ./deploy/docker/mysql-entrypoint.sh:/mysql-entrypoint.sh:ro
    entrypoint: ["sh", "/mysql-entrypoint.sh"]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "test -f /workdir/.env && . /workdir/.env && mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      prepare-data-dirs:
        condition: service_completed_successfully
      ensure-env:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      prepare-data-dirs:
        condition: service_completed_successfully
      ensure-env:
        condition: service_completed_successfully
  # 工具容器：当根 .env 的 DB_PASS 改了，但想保留现有 data/mysql 时，
  # 用它把 MySQL 中的业务账号密码显式轮换为根 .env 的值。
  rotate-db-password:
    profiles: ["tools"]
    image: mysql:8.0
    pull_policy: always
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}-rotate-db-password
    volumes:
      - .:/workdir
      - ./deploy/docker/rotate-db-password.sh:/rotate-db-password.sh:ro
    command: sh /rotate-db-password.sh
    restart: "no"
    depends_on:
      ensure-env:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
