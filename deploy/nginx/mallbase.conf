# ==========================================
# MallBase Nginx 站点片段
#
# 适用场景：已通过 1Panel / 宝塔 / PhpWebStudy 等面板创建网站
# （面板会自动生成 server / listen / server_name / ssl / 日志 等基础配置，
#  本文件只关心 MallBase 项目特有的 location 规则）
#
# 目录约定（把前端构建产物放到 backend/public 下）：
#   <PROJECT_ROOT>/backend/public/          ← 站点 root，ThinkPHP 公共目录
#   <PROJECT_ROOT>/backend/public/admin/    ← Admin 后台构建产物（base 必须为 /admin/）
#   <PROJECT_ROOT>/backend/public/client/   ← UniApp H5 构建产物（base 必须为 /client/）
#
# 服务说明：
#   - 后端：Swoole 监听 127.0.0.1:8080（可在项目 .env 调整，对应下方 ② 处）
#   - 升级页：systemd 按任务临时启动 Go 程序并监听 127.0.0.1:18081（对应下方 ③ 处）
#   - Admin 后台静态 / H5 客户端静态：由 nginx 直接托管（用 root，不要用 alias）
#   - 后端 API / 上传文件 / 安装向导：反向代理到 Swoole
#   - 第三方回调（微信支付等）：反向代理到后端，路径前缀 /api/notify/
#
# 使用方法：
#   1. 用面板创建站点，域名与 SSL 证书按面板流程完成
#   2. 把下方 ① 处的 <PROJECT_ROOT> 改成项目实际路径（见下方“路径注意”）
#   3. 如需调整后端端口，改下方所有 ② 处的 8080
#   4. 如需调整 Go 升级端口，改下方 ③ 处的 18081
#   5. 把 “PROJECT-CONFIG-BEGIN ~ END” 之间的内容粘贴进面板的
#      「反向代理」/「配置文件」自定义区域；nginx -t 通过后 reload
#
# 路径注意（重要）：
#   下方 root 必须填 nginx 进程“看得到”的路径，不一定等于你在宿主机上的路径。
#   - 普通安装（宝塔 / 直接装 nginx）：就是宿主机真实路径，例如
#       /www/wwwroot/mallbase/backend/public  或  /var/www/mallbase/backend/public
#   - 1Panel：OpenResty 跑在 Docker 容器里，宿主机的 /opt/1panel/www 被挂载为
#       容器内的 /www。所以这里要写 容器视角 的路径，例如：
#         root /www/sites/<你的域名>/index/<项目目录>/backend/public;
#       而 *不是* /opt/1panel/www/sites/...（容器里没有 /opt/1panel，会导致
#       try_files 找不到 index.html → 内部重定向死循环 → 500）。
#   - 不确定时，看面板自动生成的 server 块里那条 root 写的是什么，照着同一个前缀写。
# ==========================================


# PROJECT-CONFIG-BEGIN

# --- 根路径：进入后端安装检查；已安装后由 ThinkPHP 跳转到 /client/ ---
location = / {
    proxy_pass http://127.0.0.1:8080;          # ② 后端端口
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 安装向导（含 /install、/install/api/...） ---
location ^~ /install {
    proxy_pass http://127.0.0.1:8080;          # ②
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 当前升级任务的只读状态页：整个前缀交给临时 Go 程序 ---
# 注意：这里不是宿主机 upgrade/ 数据目录的静态映射。
location = /upgrade {
    return 308 /upgrade/;
}
location ^~ /upgrade/ {
    proxy_pass http://127.0.0.1:18081;         # ③ Go 升级页面端口
    # 入口 ticket 位于一次性查询参数中，禁止写入 access log。
    access_log off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_connect_timeout 2s;
    proxy_read_timeout 1h;
    proxy_send_timeout 60s;
}

# --- 后端 API：Admin 后台 ---
location ^~ /admin/api/ {
    proxy_pass http://127.0.0.1:8080;          # ②
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 后端 API：H5 客户端 ---
location = /client/api {
    proxy_pass http://127.0.0.1:8080;          # ②
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}
location ^~ /client/api/ {
    proxy_pass http://127.0.0.1:8080;          # ②
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 微信支付回调：必须反代到后端，禁止任何鉴权/重定向 ---
# 微信 V3 服务器从 101.226.103.x / 121.51.58.x 等 IP POST 请求体
# 路由在 backend/route/notify.php → /api/notify/wechat/pay
location ^~ /api/notify/ {
    proxy_pass http://127.0.0.1:8080;          # ② 后端端口
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 上传文件：反代到后端；并在内部阻断可执行后缀 ---
location ^~ /uploads/ {
    location ~* \.(php|php[0-9]?|phtml|phar|cgi|pl|py|sh|html?|shtml)$ {
        deny all;
        return 403;
    }
    proxy_pass http://127.0.0.1:8080;          # ②
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- 后台静态资源（Vben Admin SPA，构建 base 必须为 /admin/） ---
location = /admin {
    return 301 /admin/;
}
location ^~ /admin/ {
    root <PROJECT_ROOT>/backend/public;        # ① 改成项目路径（见文件顶部“路径注意”）
    try_files $uri /admin/index.html;

    # HTML 外壳不缓存，保证每次都拿到最新的 chunk 引用
    location = /admin/index.html {
        add_header Cache-Control "no-cache";
    }
    # 带 hash 的静态资源：长缓存，避免每次刷新重下整包
    # （^~ 前缀匹配会短路下方的正则块，缓存规则必须写在这里才生效）
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
}

# --- H5 客户端静态资源（UniApp H5 SPA，构建 base 必须为 /client/） ---
location = /client {
    return 301 /client/;
}
location ^~ /client/ {
    root <PROJECT_ROOT>/backend/public;        # ① 同上
    try_files $uri /client/index.html;

    # HTML 外壳不缓存，保证每次都拿到最新的 chunk 引用
    location = /client/index.html {
        add_header Cache-Control "no-cache";
    }
    # 带 hash 的静态资源：长缓存（理由同 /admin/ 块）
    location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
}

# --- 禁止直接访问后端入口脚本（后端是 Swoole，nginx 不执行 PHP） ---
location ~* \.php$ {
    deny all;
    return 403;
}

# --- 其它静态资源（favicon、robots、/static 等） ---
location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
    root <PROJECT_ROOT>/backend/public;        # ① 同上
    expires 7d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
}

location / {
    root <PROJECT_ROOT>/backend/public;        # ① 同上
    try_files $uri $uri/ =404;
}

# PROJECT-CONFIG-END
