# ==========================================
# MallBase Nginx 站点片段
#
# 适用场景：已通过 宝塔 / PhpWebStudy 等面板创建网站
# (面板会自动生成 server / listen / server_name / ssl / 日志 等基础配置,
#  本文件只关心 MallBase 项目特有的 location 规则)
#
# 使用方法:
#   1. 用面板创建站点,域名与 SSL 证书按面板流程完成
#   2. 站点根目录(root) 指向项目公共目录,例如:
#        开发环境: /Users/gosowong/code/OpenSource/mall-base/backend/public
#        生产环境: /var/www/mallbase/backend/public
#   3. 把下方 "PROJECT-CONFIG-BEGIN ~ END" 之间的内容
#      粘贴进面板的「反向代理」或「配置文件」自定义区域
#   4. 修改 ① 处 Admin 静态目录的绝对路径
#   5. 如需调整后端端口,修改 ② 处的 8080
#   6. nginx -t 通过后 reload
#
# 路径参考(把构建产物放到 backend/public 下的方案):
#   <PROJECT_ROOT>/backend/public/         ← 站点 root
#   <PROJECT_ROOT>/backend/public/client/  ← H5 构建产物
#   <PROJECT_ROOT>/backend/public/admin/    ← Admin alias
#
# 服务说明:
#   - 后端: Swoole 监听 127.0.0.1:8080(可在项目 .env 调整)
#   - H5 客户端静态: 由 nginx 从 /client/ 承接
#   - Admin 后台静态: 由 nginx 通过 alias 单独服务
#   - 后端 API / 上传文件 / 安装向导: 反向代理到 Swoole
# ==========================================


# PROJECT-CONFIG-BEGIN

# --- 根路径: 进入后端安装检查,已安装后由 ThinkPHP 跳转到 /client/ ---
location = / {
    proxy_pass http://127.0.0.1:8080;   # ② 后端端口
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 后端 API: H5 客户端 ---
location = /client/api {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

location ^~ /client/api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- H5 客户端静态资源 ---
location = /client {
    return 301 /client/;
}

location ^~ /client/ {
    alias /var/www/mallbase/backend/public/client/;
    try_files $uri $uri/ /client/index.html;
}

# --- 后台静态资源 ---
location = /admin {
    return 301 /admin/;
}

# ① 修改这里:Admin 构建产物绝对路径(末尾保留斜杠)
#   开发环境示例: /Users/yourname/code/mall-base/backend/public/admin/
#   生产环境示例: /var/www/mallbase/backend/public/admin/
location ^~ /admin/ {
    alias /var/www/mallbase/backend/public/admin/;
    try_files $uri $uri/ /admin/index.html;
}

# --- 后端 API: Admin 后台 ---
location ^~ /admin/api/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
}

# --- 安装向导 ---
location /install {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# --- 上传文件 ---
# 阻断可执行后缀,避免上传目录被当作脚本执行
location ~* ^/uploads/.*\.(php|php[0-9]?|phtml|phar|cgi|pl|py|sh|html?|shtml)$ {
    deny all;
    return 403;
}

# 使用 ^~ 优先于下方静态资源正则,确保走反向代理
location ^~ /uploads/ {
    proxy_pass http://127.0.0.1:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ~* \.(js|mjs|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, immutable";
}

location / {
    try_files $uri $uri/ =404;
}

# PROJECT-CONFIG-END
