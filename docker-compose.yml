# ==========================================
# 生产环境：单后端容器
#
# 配置源：构建时 backend/.env（镜像内 /app/.env）
# 用法: docker compose --env-file backend/.env up -d --build
# 需要：外部 MySQL 8.0+ / Redis 6.0+
# ==========================================

name: ${MALLBASE_COMPOSE_PROJECT_NAME:-mallbase}

services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: ${MALLBASE_CONTAINER_PREFIX:-mallbase}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${SWOOLE_HTTP_PORT:-8080}:${SWOOLE_HTTP_PORT:-8080}"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - backend_runtime:/app/runtime
      - backend_uploads:/app/public/uploads

volumes:
  backend_runtime:
  backend_uploads:
